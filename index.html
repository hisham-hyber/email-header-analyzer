<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSINT Email Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <div class="w-64 bg-black text-white p-5">
    <h1 class="text-lg font-bold mb-6">OSINT Dashboard</h1>
    <p class="text-xs text-gray-400">Email Metadata Analyzer</p>

    <div class="mt-6 text-xs space-y-2">
      <div>• Paste Headers</div>
      <div>• Analyze</div>
      <div>• Inspect Routes</div>
      <div>• Identify Providers</div>
    </div>
  </div>

  <!-- Main -->
  <div class="flex-1 p-6">

    <!-- Input -->
    <div class="bg-white p-4 rounded-xl shadow mb-6">
      <textarea id="headers" class="w-full h-40 border p-3 rounded" placeholder="Paste full email headers here..."></textarea>
      <button onclick="analyze()" class="mt-3 bg-black text-white px-4 py-2 rounded">Run Analysis</button>
    </div>

    <!-- Stats -->
    <div id="stats" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6"></div>

    <!-- Server Table -->
    <div class="bg-white p-4 rounded-xl shadow">
      <h2 class="font-bold mb-3">Server Route Analysis</h2>
      <div id="servers" class="space-y-2 text-sm"></div>
    </div>

  </div>
</div>

<script>

function decodeMime(str) {
  try {
    return str.replace(/=\?utf-8\?q\?([^?]+)\?=/gi, (_, encoded) => {
      return decodeURIComponent(
        encoded.replace(/_/g,' ')
                .replace(/=([A-Fa-f0-9]{2})/g,'%$1')
      );
    });
  } catch(e){ return str; }
}

function detectIP(line){
  const m = line.match(/\[(\d{1,3}(?:\.\d{1,3}){3})\]/);
  if(!m) return null;
  const ip = m[1];

  if(ip.startsWith("10.") || ip.startsWith("192.168") || ip.startsWith("172."))
    return {ip, org:"Private Network", country:"N/A"};

  if(ip.startsWith("167.89") || ip.startsWith("108.179"))
    return {ip, org:"SendGrid / Twilio", country:"USA"};

  if(ip.startsWith("209.85") || ip.startsWith("172.217"))
    return {ip, org:"Google", country:"Global"};

  return {ip, org:"Unknown Provider", country:"Unknown"};
}

function card(title,value){
  return `<div class="bg-gray-50 p-3 rounded-xl border">
    <div class="text-xs text-gray-500">${title}</div>
    <div class="text-sm font-mono break-all">${value}</div>
  </div>`;
}

function analyze(){

  const lines = document.getElementById("headers").value.split("\n");

  let from="", to="", subject="", decoded="", date="";
  let servers=[];

  lines.forEach(l=>{
    const low=l.toLowerCase();

    if(low.startsWith("from:")) from=l;
    if(low.startsWith("to:")) to=l;
    if(low.startsWith("subject:")){
      subject=l;
      decoded=decodeMime(l);
    }
    if(low.startsWith("date:")) date=l;

    if(low.startsWith("received:")){
      const ip=detectIP(l);
      if(ip) servers.push(ip);
    }
  });

  // STATS
  document.getElementById("stats").innerHTML = `
    ${card("From",from)}
    ${card("To",to)}
    ${card("Subject",subject)}
    ${card("Decoded",decoded)}
  `;

  // SERVERS
  let html="";
  servers.forEach((s,i)=>{
    html+=`<div class="border p-3 rounded-lg">
      <div class="font-mono">${s.ip}</div>
      <div class="text-xs text-gray-600">${s.org} | ${s.country}</div>
    </div>`;
  });

  document.getElementById("servers").innerHTML=html;
}

</script>

</body>
</html>
